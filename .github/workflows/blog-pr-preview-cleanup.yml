# pull_request_target lets this run in the base repo's context with write
# permissions for fork PRs. Safe here because the job runs no PR code —
# it only deletes a directory keyed by PR number.
#
# No paths filter: the preview may exist even if the final diff no longer
# touches blog/, so always check for the directory.
#
# No concurrency group: a shared group would let GitHub silently cancel a
# pending cleanup (only one run may queue per group), leaving a dead preview
# online forever. Concurrent pushes to gh-pages are resolved by the
# rebase-and-retry loop below instead.
name: Blog PR Preview Cleanup

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview
        run: |
          PREVIEW_DIR="blog/pr-preview/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -r "$PREVIEW_DIR"
            git commit -m "Clean up blog PR preview for #${{ github.event.pull_request.number }}"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase origin gh-pages
            done
            git push
          else
            echo "No preview directory to remove."
          fi

      # only_update: PRs that never had a preview get no comment.
      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: blog-preview
          number: ${{ github.event.pull_request.number }}
          only_update: true
          message: |
            📖 Blog preview removed because the PR was closed.
