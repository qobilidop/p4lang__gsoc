baseURL = "https://p4lang.github.io/gsoc/blog/"
locale = "en-US"
title = "P4 GSoC Blog"
copyright = "© [p4lang/gsoc contributors](https://github.com/p4lang/gsoc/graphs/contributors?all=1)"

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[pagination]
  pagerSize = 10

# Project reports use raw HTML (<img>, <picture>, <br>), which Goldmark
# strips by default.
[markup.goldmark.renderer]
  unsafe = true

[params]
  # Keep all home-page post cards uniform (no hero for the newest post).
  disableSpecial1stPost = true

  ShowReadingTime = true
  ShowWordCount = true
  ShowToc = true
